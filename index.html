<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0B0B0C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MonsterDex" />
    <!-- iOS home-screen icon (Safari ignores the web manifest for this) + browser-tab
         favicon. The hrefs are absolute, so they must include the Vite `base`
         ('/monsterdex/') — keep in sync with vite.config.ts. PNGs generated by
         `npm run gen:icons` (asset-manifest §1). -->
    <link rel="apple-touch-icon" href="/monsterdex/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/monsterdex/icons/favicon-32.png" />
    <title>MonsterDex</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
