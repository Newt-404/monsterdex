# Builds the Vite app and publishes it to GitHub Pages on every push to main.
# The live preview lands at https://newt-404.github.io/monsterdex/ (the trailing
# /monsterdex/ matches vite.config base, so asset URLs resolve correctly).
#
# NOTE: this is the deploy *plumbing* only — a plain static site. The PWA /
# offline / install-to-home-screen work is still owned by milestone M5; nothing
# here pre-builds those features.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy by hand from the Actions tab

# Permissions the deploy needs (least-privilege).
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a newer push cancels an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build # tsc --noEmit && vite build → dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
